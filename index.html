  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-weight: 600;\n  font-display: swap;\n  src: url(\"f26a1994-7810-4e6e-af76-3b0b75899792\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Sarabun';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"871cab75-d893-4c64-8244-86329ce309ef\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* thai */\n@font-face {\n  font-family: 'Sarabun';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"5b6e8b0a-0535-4b83-9bd4-c05f88e8f3ae\") format('woff2');\n  unicode-range: U+02D7, U+0303, U+0331, U+0E01-0E5B, U+200C-200D, U+25CC;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Sarabun';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"93fe8a47-c331-4d4b-ae5d-6cf41ef7fc2c\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Sarabun';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"bb798e8e-e9db-4388-895e-a956ef75f2a4\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Sarabun';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f59e04f0-33ba-4153-b806-bdfbf33dd9c7\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"390ec60f-5d97-485c-9493-b24aa0b1fab2\"><\u002Fscript>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  .liff-scroll::-webkit-scrollbar { width: 0; }\n  input:focus, textarea:focus { outline: none; border-color: #06C755 !important; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"min-height: 100%; background: #f2f4f7; font-family: 'Sarabun', sans-serif; color: #1d2b3a; display: flex; justify-content: center;\">\n  <div style=\"width: 100%; max-width: 430px; background: #f2f4f7; min-height: 100vh; display: flex; flex-direction: column;\">\n\n    <!-- LINE-style header bar -->\n    <div style=\"background: #06C755; color: #fff; padding: 14px 18px 16px; position: sticky; top: 0; z-index: 5; box-shadow: 0 1px 4px rgba(0,0,0,0.08);\">\n      <div style=\"display: flex; align-items: center; gap: 10px;\">\n        <div style=\"width: 34px; height: 34px; border-radius: 9px; background: rgba(255,255,255,0.22); display: flex; align-items: center; justify-content: center; font-size: 19px;\">🥮<\u002Fdiv>\n        <div>\n          <div style=\"font-size: 16px; font-weight: 700; line-height: 1.2;\">รายงานการผลิตขนมเปี๊ยะ<\u002Fdiv>\n          <div style=\"font-size: 11.5px; opacity: 0.9; font-weight: 500; margin-top: 1px;\">ประจำวัน · ส่งเข้ากลุ่มไลน์<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"liff-scroll\" style=\"flex: 1; overflow-y: auto; padding: 14px 14px 120px; display: flex; flex-direction: column; gap: 12px;\">\n\n      <!-- Header info card -->\n      <div style=\"background: #fff; border: 1px solid #e4e7ec; border-radius: 14px; padding: 16px;\">\n        <div style=\"font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: #06C755; text-transform: uppercase; margin-bottom: 14px;\">ข้อมูลรายงาน<\u002Fdiv>\n\n        <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n          <div>\n            <label style=\"display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #475467;\">วันที่ผลิต<\u002Flabel>\n            <input type=\"date\" value=\"{{ date }}\" onchange=\"{{ setDate }}\" style=\"width: 100%; font-family: 'Sarabun', sans-serif; font-size: 15px; color: #1d2b3a; border: 1px solid #e4e7ec; border-radius: 10px; padding: 11px 12px; background: #fff;\">\n          <\u002Fdiv>\n\n          <div>\n            <label style=\"display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #475467;\">ผู้รายงาน<\u002Flabel>\n            <input type=\"text\" placeholder=\"ชื่อผู้รายงาน\" value=\"{{ reporter }}\" onchange=\"{{ setReporter }}\" style=\"width: 100%; font-family: 'Sarabun', sans-serif; font-size: 15px; color: #1d2b3a; border: 1px solid #e4e7ec; border-radius: 10px; padding: 11px 12px; background: #fff;\">\n          <\u002Fdiv>\n\n          <div>\n            <label style=\"display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #475467;\">ประเภทการขาย<\u002Flabel>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 8px;\">\n              <button onclick=\"{{ selectStore }}\" style=\"{{ storeBtnStyle }}\">ขายหน้าร้าน<\u002Fbutton>\n              <button onclick=\"{{ selectCustom }}\" style=\"{{ customBtnStyle }}\">ลูกค้าสั่งทำ<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ isCustom }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <label style=\"display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #475467;\">ชื่อลูกค้า<\u002Flabel>\n              <input type=\"text\" placeholder=\"ชื่อลูกค้าที่สั่งทำ\" value=\"{{ customerName }}\" onchange=\"{{ setCustomerName }}\" style=\"width: 100%; font-family: 'Sarabun', sans-serif; font-size: 15px; color: #1d2b3a; border: 1px solid #e4e7ec; border-radius: 10px; padding: 11px 12px; background: #fff;\">\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Standard products card -->\n      <div style=\"background: #fff; border: 1px solid #e4e7ec; border-radius: 14px; padding: 16px 16px 8px;\">\n        <div style=\"font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: #06C755; text-transform: uppercase; margin-bottom: 4px;\">รายการสินค้ามาตรฐาน<\u002Fdiv>\n        <div style=\"font-size: 12px; color: #98a2b3; margin-bottom: 10px;\">ใส่จำนวนในช่อง คิดยอดอัตโนมัติ<\u002Fdiv>\n\n        <sc-for list=\"{{ productRows }}\" as=\"item\" hint-placeholder-count=\"6\">\n          <div style=\"display: flex; align-items: center; gap: 10px; padding: 11px 0; border-top: 1px solid #f2f4f7;\">\n            <div style=\"flex: 1; min-width: 0;\">\n              <div style=\"font-size: 14.5px; font-weight: 600; line-height: 1.25;\">{{ item.name }}<\u002Fdiv>\n              <div style=\"font-size: 12px; color: #98a2b3; margin-top: 1px;\">{{ item.priceLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n            <input type=\"number\" min=\"0\" placeholder=\"0\" value=\"{{ item.qty }}\" onchange=\"{{ item.setQty }}\" style=\"width: 62px; flex-shrink: 0; text-align: center; font-family: 'Sarabun', sans-serif; font-size: 15px; font-weight: 700; color: #1d2b3a; border: 1px solid #e4e7ec; border-radius: 10px; padding: 9px 6px; background: #fff;\">\n            <div style=\"width: 68px; text-align: right; font-size: 14px; font-weight: 700; color: {{ item.totalColor }};\">{{ item.lineTotal }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- Special order card -->\n      <div style=\"background: #fff; border: 1px solid #e4e7ec; border-radius: 14px; padding: 16px;\">\n        <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;\">\n          <div style=\"font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: #06C755; text-transform: uppercase;\">รายการสั่งพิเศษ<\u002Fdiv>\n          <button onclick=\"{{ addSpecial }}\" style=\"font-family: 'Sarabun', sans-serif; font-size: 12.5px; font-weight: 600; color: #06C755; background: #eafaf1; border: none; border-radius: 8px; padding: 6px 12px; cursor: pointer;\">+ เพิ่มแถว<\u002Fbutton>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ hasSpecial }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n            <sc-for list=\"{{ specialRows }}\" as=\"row\" hint-placeholder-count=\"1\">\n              <div style=\"border: 1px solid #e4e7ec; border-radius: 11px; padding: 10px; background: #fcfcfd;\">\n                <div style=\"display: flex; align-items: center; gap: 8px; margin-bottom: 8px;\">\n                  <input type=\"text\" placeholder=\"ชื่อขนม\" value=\"{{ row.name }}\" onchange=\"{{ row.setName }}\" style=\"flex: 1; min-width: 0; font-family: 'Sarabun', sans-serif; font-size: 14px; color: #1d2b3a; border: 1px solid #e4e7ec; border-radius: 8px; padding: 9px 10px; background: #fff;\">\n                  <button onclick=\"{{ row.remove }}\" style=\"width: 32px; height: 32px; flex-shrink: 0; border: none; background: #fef3f2; color: #f04438; border-radius: 8px; font-size: 15px; cursor: pointer; line-height: 1;\">✕<\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"display: flex; align-items: center; gap: 8px;\">\n                  <div style=\"flex: 1;\">\n                    <div style=\"font-size: 11px; color: #98a2b3; margin-bottom: 3px;\">จำนวน<\u002Fdiv>\n                    <input type=\"number\" min=\"0\" placeholder=\"0\" value=\"{{ row.qty }}\" onchange=\"{{ row.setQty }}\" style=\"width: 100%; font-family: 'Sarabun', sans-serif; font-size: 14px; color: #1d2b3a; border: 1px solid #e4e7ec; border-radius: 8px; padding: 8px 9px; background: #fff;\">\n                  <\u002Fdiv>\n                  <div style=\"flex: 1;\">\n                    <div style=\"font-size: 11px; color: #98a2b3; margin-bottom: 3px;\">ราคา/ชิ้น<\u002Fdiv>\n                    <input type=\"number\" min=\"0\" placeholder=\"0\" value=\"{{ row.price }}\" onchange=\"{{ row.setPrice }}\" style=\"width: 100%; font-family: 'Sarabun', sans-serif; font-size: 14px; color: #1d2b3a; border: 1px solid #e4e7ec; border-radius: 8px; padding: 8px 9px; background: #fff;\">\n                  <\u002Fdiv>\n                  <div style=\"width: 78px; text-align: right;\">\n                    <div style=\"font-size: 11px; color: #98a2b3; margin-bottom: 3px;\">ยอด<\u002Fdiv>\n                    <div style=\"font-size: 15px; font-weight: 700; padding: 8px 0;\">{{ row.lineTotal }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ noSpecial }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"text-align: center; font-size: 13px; color: #98a2b3; padding: 8px 0 4px;\">ยังไม่มีรายการสั่งพิเศษ<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- Notes card -->\n      <div style=\"background: #fff; border: 1px solid #e4e7ec; border-radius: 14px; padding: 16px;\">\n        <label style=\"display: block; font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: #06C755; text-transform: uppercase; margin-bottom: 10px;\">หมายเหตุเพิ่มเติม<\u002Flabel>\n        <textarea placeholder=\"รายละเอียดเพิ่มเติม เช่น ของเหลือ ยอดจอง ฯลฯ\" value=\"{{ notes }}\" onchange=\"{{ setNotes }}\" rows=\"3\" style=\"width: 100%; font-family: 'Sarabun', sans-serif; font-size: 14.5px; color: #1d2b3a; border: 1px solid #e4e7ec; border-radius: 10px; padding: 11px 12px; background: #fff; resize: vertical;\"><\u002Ftextarea>\n      <\u002Fdiv>\n\n      <!-- Summary -->\n      <div style=\"background: #1d2b3a; border-radius: 14px; padding: 16px 18px; color: #fff;\">\n        <div style=\"display: flex; justify-content: space-between; align-items: baseline; font-size: 13.5px; opacity: 0.75; margin-bottom: 6px;\">\n          <span>ยอดมาตรฐาน<\u002Fspan><span>{{ standardTotalLabel }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display: flex; justify-content: space-between; align-items: baseline; font-size: 13.5px; opacity: 0.75; margin-bottom: 12px;\">\n          <span>ยอดสั่งพิเศษ<\u002Fspan><span>{{ specialTotalLabel }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display: flex; justify-content: space-between; align-items: baseline; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 12px;\">\n          <span style=\"font-size: 15px; font-weight: 600;\">ยอดรวมสุทธิ<\u002Fspan>\n          <span style=\"font-size: 26px; font-weight: 700; color: #4ade80;\">{{ grandTotalLabel }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <!-- Sticky submit -->\n    <div style=\"position: sticky; bottom: 0; background: rgba(242,244,247,0.92); backdrop-filter: blur(6px); padding: 12px 14px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid #e4e7ec;\">\n      <button onclick=\"{{ submit }}\" style=\"width: 100%; font-family: 'Sarabun', sans-serif; font-size: 16px; font-weight: 700; color: #fff; background: #06C755; border: none; border-radius: 12px; padding: 15px; cursor: pointer; box-shadow: 0 4px 12px rgba(6,199,85,0.32); display: flex; align-items: center; justify-content: center; gap: 8px;\">\n        <span style=\"font-size: 18px;\">💬<\u002Fspan> ส่งรายงานเข้าไลน์\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Preview modal -->\n  <sc-if value=\"{{ showPreview }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closePreview }}\" style=\"position: fixed; inset: 0; background: rgba(29,43,58,0.55); display: flex; align-items: flex-end; justify-content: center; z-index: 20;\">\n      <div onclick=\"{{ stop }}\" style=\"width: 100%; max-width: 430px; background: #7494c0; border-radius: 18px 18px 0 0; padding: 16px 14px calc(20px + env(safe-area-inset-bottom)); max-height: 82vh; overflow-y: auto;\">\n        <div style=\"width: 40px; height: 4px; border-radius: 3px; background: rgba(255,255,255,0.5); margin: 0 auto 14px;\"><\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 8px; margin-bottom: 14px; padding: 0 4px;\">\n          <div style=\"width: 22px; height: 22px; border-radius: 6px; background: #06C755; display: flex; align-items: center; justify-content: center; font-size: 12px;\">📋<\u002Fdiv>\n          <div style=\"font-size: 13.5px; font-weight: 700; color: #fff;\">กลุ่ม: รายงานผลิตขนมเปี๊ยะ<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- chat bubble -->\n        <div style=\"display: flex; gap: 8px; align-items: flex-end;\">\n          <div style=\"width: 34px; height: 34px; border-radius: 50%; background: #06C755; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 17px;\">🥮<\u002Fdiv>\n          <div style=\"max-width: 82%;\">\n            <div style=\"font-size: 11.5px; color: rgba(255,255,255,0.9); margin: 0 0 3px 4px;\">ระบบรายงานการผลิต<\u002Fdiv>\n            <div style=\"background: #fff; border-radius: 4px 16px 16px 16px; padding: 13px 14px; font-size: 13.5px; line-height: 1.55; color: #1d2b3a; white-space: pre-wrap;\">{{ lineMessage }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top: 14px; display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"display: flex; align-items: center; gap: 9px; background: rgba(255,255,255,0.16); border-radius: 10px; padding: 10px 12px;\">\n            <span style=\"font-size: 15px;\">{{ sheetIcon }}<\u002Fspan>\n            <span style=\"font-size: 13px; font-weight: 600; color: #fff; flex: 1;\">📊 Google Sheet<\u002Fspan>\n            <span style=\"font-size: 12px; font-weight: 600; color: #fff; opacity: 0.92;\">{{ sheetStatusLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 9px; background: rgba(255,255,255,0.16); border-radius: 10px; padding: 10px 12px;\">\n            <span style=\"font-size: 15px;\">{{ lineIcon }}<\u002Fspan>\n            <span style=\"font-size: 13px; font-weight: 600; color: #fff; flex: 1;\">💬 ส่งเข้าไลน์<\u002Fspan>\n            <span style=\"font-size: 12px; font-weight: 600; color: #fff; opacity: 0.92;\">{{ lineStatusLabel }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ closePreview }}\" style=\"width: 100%; margin-top: 14px; font-family: 'Sarabun', sans-serif; font-size: 15px; font-weight: 700; color: #1d2b3a; background: #fff; border: none; border-radius: 11px; padding: 13px; cursor: pointer;\">เสร็จสิ้น<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    date: new Date().toISOString().slice(0, 10),\n    reporter: \"\",\n    saleType: \"store\",\n    customerName: \"\",\n    products: [\n      { id: \"p12\",  name: \"เปี๊ยะ (ชิ้น)\",            price: 12,  qty: 0 },\n      { id: \"p35\",  name: \"เปี๊ยะ กล่องเล็ก\",         price: 35,  qty: 0 },\n      { id: \"p70\",  name: \"เปี๊ยะ กล่อง 70\",          price: 70,  qty: 0 },\n      { id: \"p130\", name: \"เปี๊ยะ กล่อง 130\",         price: 130, qty: 0 },\n      { id: \"p220\", name: \"เปี๊ยะ กล่อง 220\",         price: 220, qty: 0 },\n      { id: \"p330\", name: \"เปี๊ยะ กล่อง 330\",         price: 330, qty: 0 },\n      { id: \"p550\", name: \"เปี๊ยะ กล่อง 550\",         price: 550, qty: 0 },\n      { id: \"p800\", name: \"เปี๊ยะ กล่อง 800\",         price: 800, qty: 0 },\n      { id: \"mini\", name: \"เปี๊ยะจิ๋ว แพ็ค 4 ลูก\",     price: 50,  qty: 0 },\n      { id: \"smoke\",name: \"เปี๊ยะอบควันเทียน (กระปุก)\", price: 30,  qty: 0 },\n      { id: \"cake\", name: \"เค้ก 1 ปอนด์\",             price: 160, qty: 0 },\n      { id: \"bread\",name: \"ขนมปัง\",                   price: 6,   qty: 0 },\n    ],\n    specialRows: [],\n    notes: \"\",\n    showPreview: false,\n    sheetStatus: \"idle\",\n    lineStatus: \"idle\",\n    _sid: 1,\n  };\n\n  // ===== ตั้งค่าตอน deploy จริง =====\n  LIFF_ID = \"\";   // ใส่ LIFF ID จาก LINE Developers (เช่น \"1234567890-abcdEFGh\")\n  GAS_URL = \"https://script.google.com/macros/s/AKfycbwv4ygqWYCnhXj8Fl-cXEXgoA7UDDDvLSsxxMhLO9fWOPWiiZHItxsxajLCfo0mvjMF/exec\";   // URL ของ Google Apps Script Web App\n  LINE_TOKEN = \"\"; // ไม่ต้องใส่ที่นี่ — เก็บฝั่ง Apps Script (ดูไฟล์ google-apps-script.gs)\n  // ==================================\n\n  async componentDidMount() {\n    if (window.liff && this.LIFF_ID) {\n      try { await liff.init({ liffId: this.LIFF_ID }); } catch (e) {}\n    }\n  }\n\n  fmt(n) {\n    return n.toLocaleString(\"en-US\") + \" ฿\";\n  }\n\n  setProductQty(id, value) {\n    this.setState((s) => ({\n      products: s.products.map((p) =>\n        p.id === id ? { ...p, qty: value } : p\n      ),\n    }));\n  }\n\n  updateSpecial(id, field, value) {\n    this.setState((s) => ({\n      specialRows: s.specialRows.map((r) =>\n        r.id === id ? { ...r, [field]: value } : r\n      ),\n    }));\n  }\n\n  standardTotal() {\n    return this.state.products.reduce((sum, p) => sum + p.price * (Number(p.qty) || 0), 0);\n  }\n  specialTotal() {\n    return this.state.specialRows.reduce(\n      (sum, r) => sum + (Number(r.qty) || 0) * (Number(r.price) || 0), 0\n    );\n  }\n\n  buildMessage() {\n    const s = this.state;\n    const lines = [];\n    lines.push(\"🥮 รายงานการผลิตขนมเปี๊ยะประจำวัน\");\n    lines.push(\"━━━━━━━━━━━━━━\");\n    lines.push(\"📅 วันที่ผลิต: \" + s.date);\n    lines.push(\"👤 ผู้รายงาน: \" + (s.reporter || \"-\"));\n    if (s.saleType === \"custom\") {\n      lines.push(\"🏷️ ประเภท: ลูกค้าสั่งทำ\");\n      lines.push(\"🙍 ลูกค้า: \" + (s.customerName || \"-\"));\n    } else {\n      lines.push(\"🏷️ ประเภท: ขายหน้าร้าน\");\n    }\n    lines.push(\"\");\n    const prod = s.products.filter((p) => (Number(p.qty) || 0) > 0);\n    if (prod.length) {\n      lines.push(\"📦 รายการมาตรฐาน\");\n      prod.forEach((p) =>\n        lines.push(\"• \" + p.name + \" × \" + (Number(p.qty) || 0) + \" = \" + this.fmt(p.price * (Number(p.qty) || 0)))\n      );\n    }\n    const sp = s.specialRows.filter((r) => (Number(r.qty) || 0) > 0 && r.name);\n    if (sp.length) {\n      lines.push(\"\");\n      lines.push(\"✨ รายการสั่งพิเศษ\");\n      sp.forEach((r) =>\n        lines.push(\"• \" + r.name + \" × \" + r.qty + \" = \" + this.fmt((Number(r.qty) || 0) * (Number(r.price) || 0)))\n      );\n    }\n    if (s.notes) {\n      lines.push(\"\");\n      lines.push(\"📝 หมายเหตุ: \" + s.notes);\n    }\n    lines.push(\"\");\n    lines.push(\"━━━━━━━━━━━━━━\");\n    lines.push(\"💰 ยอดรวมสุทธิ: \" + this.fmt(this.standardTotal() + this.specialTotal()));\n    return lines.join(\"\\n\");\n  }\n\n  buildPayload() {\n    const s = this.state;\n    const items = s.products\n      .filter((p) => (Number(p.qty) || 0) > 0)\n      .map((p) => ({ name: p.name, qty: Number(p.qty) || 0, price: p.price, total: p.price * (Number(p.qty) || 0) }));\n    const special = s.specialRows\n      .filter((r) => (Number(r.qty) || 0) > 0 && r.name)\n      .map((r) => ({ name: r.name, qty: Number(r.qty) || 0, price: Number(r.price) || 0, total: (Number(r.qty) || 0) * (Number(r.price) || 0) }));\n    return {\n      date: s.date,\n      reporter: s.reporter,\n      saleType: s.saleType === \"custom\" ? \"ลูกค้าสั่งทำ\" : \"ขายหน้าร้าน\",\n      customerName: s.saleType === \"custom\" ? s.customerName : \"\",\n      items,\n      special,\n      notes: s.notes,\n      standardTotal: this.standardTotal(),\n      specialTotal: this.specialTotal(),\n      grandTotal: this.standardTotal() + this.specialTotal(),\n      message: this.buildMessage(),\n    };\n  }\n\n  async submitReport() {\n    this.setState({ showPreview: true, sheetStatus: \"sending\", lineStatus: \"sending\" });\n    const payload = this.buildPayload();\n    const msg = payload.message;\n\n    // 1) บันทึกลง Google Sheet (ผ่าน Apps Script) — ฝั่ง Apps Script จะ push เข้าไลน์กลุ่มด้วย\n    if (this.GAS_URL) {\n      try {\n        await fetch(this.GAS_URL, {\n          method: \"POST\",\n          headers: { \"Content-Type\": \"text/plain;charset=utf-8\" },\n          body: JSON.stringify(payload),\n        });\n        this.setState({ sheetStatus: \"ok\" });\n      } catch (e) {\n        this.setState({ sheetStatus: \"error\" });\n      }\n    } else {\n      this.setState({ sheetStatus: \"demo\" });\n    }\n\n    // 2) ส่งข้อความเข้าแชตที่เปิดฟอร์มอยู่ (LIFF)\n    if (window.liff && this.LIFF_ID && liff.isLoggedIn && liff.isLoggedIn()) {\n      try {\n        await liff.sendMessages([{ type: \"text\", text: msg }]);\n        this.setState({ lineStatus: \"ok\" });\n        if (liff.isInClient && liff.isInClient()) setTimeout(() => liff.closeWindow(), 1200);\n      } catch (e) {\n        this.setState({ lineStatus: \"error\" });\n      }\n    } else {\n      this.setState({ lineStatus: \"demo\" });\n    }\n  }\n\n  statusInfo(st) {\n    switch (st) {\n      case \"sending\": return { label: \"กำลังส่ง…\", icon: \"⏳\" };\n      case \"ok\":      return { label: \"สำเร็จ\", icon: \"✅\" };\n      case \"error\":   return { label: \"ล้มเหลว\", icon: \"⚠️\" };\n      case \"demo\":    return { label: \"ตัวอย่าง (ยังไม่ deploy)\", icon: \"🔸\" };\n      default:        return { label: \"รอ\", icon: \"•\" };\n    }\n  }\n\n  renderVals() {\n    const s = this.state;\n    const sheetI = this.statusInfo(s.sheetStatus);\n    const lineI = this.statusInfo(s.lineStatus);\n    const activeBtn = \"font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;padding:11px;border-radius:10px;cursor:pointer;border:1.5px solid #06C755;background:#eafaf1;color:#06715a;\";\n    const idleBtn = \"font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;padding:11px;border-radius:10px;cursor:pointer;border:1.5px solid #e4e7ec;background:#fff;color:#667085;\";\n\n    const productRows = s.products.map((p) => {\n      const q = Number(p.qty) || 0;\n      return {\n        name: p.name,\n        qty: p.qty,\n        priceLabel: this.fmt(p.price) + \" / ชิ้น\",\n        lineTotal: this.fmt(p.price * q),\n        totalColor: q > 0 ? \"#1d2b3a\" : \"#d0d5dd\",\n        setQty: (e) => this.setProductQty(p.id, e.target.value),\n      };\n    });\n\n    const specialRows = s.specialRows.map((r) => ({\n      name: r.name,\n      qty: r.qty,\n      price: r.price,\n      lineTotal: this.fmt((Number(r.qty) || 0) * (Number(r.price) || 0)),\n      setName: (e) => this.updateSpecial(r.id, \"name\", e.target.value),\n      setQty: (e) => this.updateSpecial(r.id, \"qty\", e.target.value),\n      setPrice: (e) => this.updateSpecial(r.id, \"price\", e.target.value),\n      remove: () => this.setState((st) => ({ specialRows: st.specialRows.filter((x) => x.id !== r.id) })),\n    }));\n\n    const std = this.standardTotal();\n    const spc = this.specialTotal();\n\n    return {\n      date: s.date,\n      reporter: s.reporter,\n      customerName: s.customerName,\n      notes: s.notes,\n      isCustom: s.saleType === \"custom\",\n      showPreview: s.showPreview,\n      productRows,\n      specialRows,\n      hasSpecial: s.specialRows.length > 0,\n      noSpecial: s.specialRows.length === 0,\n      standardTotalLabel: this.fmt(std),\n      specialTotalLabel: this.fmt(spc),\n      grandTotalLabel: this.fmt(std + spc),\n      lineMessage: s.showPreview ? this.buildMessage() : \"\",\n      sheetStatusLabel: sheetI.label,\n      sheetIcon: sheetI.icon,\n      lineStatusLabel: lineI.label,\n      lineIcon: lineI.icon,\n      storeBtnStyle: s.saleType === \"store\" ? activeBtn : idleBtn,\n      customBtnStyle: s.saleType === \"custom\" ? activeBtn : idleBtn,\n\n      setDate: (e) => this.setState({ date: e.target.value }),\n      setReporter: (e) => this.setState({ reporter: e.target.value }),\n      setCustomerName: (e) => this.setState({ customerName: e.target.value }),\n      setNotes: (e) => this.setState({ notes: e.target.value }),\n      selectStore: () => this.setState({ saleType: \"store\" }),\n      selectCustom: () => this.setState({ saleType: \"custom\" }),\n      addSpecial: () => this.setState((st) => ({\n        specialRows: [...st.specialRows, { id: \"s\" + st._sid, name: \"\", qty: \"\", price: \"\" }],\n        _sid: st._sid + 1,\n      })),\n      submit: () => this.submitReport(),\n      closePreview: () => this.setState({ showPreview: false }),\n      stop: (e) => e.stopPropagation(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
